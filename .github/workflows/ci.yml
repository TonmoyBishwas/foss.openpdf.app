name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint and unit tests
        run: ./gradlew lint testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Check 64-bit native libs are 16KB page aligned
        # Play's 16KB page-size requirement applies to 64-bit libraries only.
        # ABI splits produce app-universal-debug.apk (no plain app-debug.apk).
        run: |
          APK=$(ls app/build/outputs/apk/debug/app-universal-debug.apk \
                   app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | head -1)
          echo "Checking $APK"
          mkdir -p /tmp/apk && unzip -o -q "$APK" -d /tmp/apk
          [ -d /tmp/apk/lib ] || { echo "no native libs"; exit 0; }
          FAIL=0
          for so in $(find /tmp/apk/lib/arm64-v8a /tmp/apk/lib/x86_64 -name '*.so' 2>/dev/null); do
            ALIGN=$(readelf -lW "$so" | awk '/LOAD/ {print $NF}' | sort -u | tail -1)
            echo "$so align=$ALIGN"
            case "$ALIGN" in
              0x4000|0x10000) ;;
              *) echo "::error::$so is not 16KB aligned ($ALIGN)"; FAIL=1 ;;
            esac
          done
          exit $FAIL

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-universal-debug.apk
