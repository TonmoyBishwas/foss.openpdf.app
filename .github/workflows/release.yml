name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed APK and AAB
        env:
          OPENPDF_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          OPENPDF_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          OPENPDF_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export OPENPDF_KEYSTORE="$RUNNER_TEMP/release.jks"
          ./gradlew assembleRelease bundleRelease

      - name: Rename artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cp app/build/outputs/apk/release/app-release.apk "OpenPDF-${VERSION}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "OpenPDF-${VERSION}.aab"

      - name: Extract changelog for this version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver "$" {flag=1; next}
            /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "Release $VERSION" > release-notes.md; fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            OpenPDF-*.apk
            OpenPDF-*.aab
